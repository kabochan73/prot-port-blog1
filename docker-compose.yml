services:
  # ----------------------------------------
  # Nginx: リバースプロキシ
  # フロントエンド(3000)とバックエンド(/api)への
  # リクエストを振り分ける役割を担います
  # ----------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/backend
    depends_on:
      - php
      - next
    networks:
      - blog-network

  # ----------------------------------------
  # PHP-FPM: Laravelの実行環境
  # PHP 8.2 + Composerをインストールした
  # カスタムイメージを使用します
  # ----------------------------------------
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/backend
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=blog_db
      - DB_USERNAME=blog_user
      - DB_PASSWORD=blog_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blog-network

  # ----------------------------------------
  # MySQL: データベース
  # ブログ記事・ユーザー情報を保存します
  # ----------------------------------------
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: blog_db
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: blog_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  # ----------------------------------------
  # Next.js: フロントエンド
  # SSGを使ってビルド時に静的ページを生成します
  # 開発時はdev modeで動作します
  # ----------------------------------------
  next:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - API_URL=http://nginx/api
    depends_on:
      - php
    networks:
      - blog-network

# ----------------------------------------
# Volumes: データの永続化
# コンテナを削除してもDBのデータが残ります
# ----------------------------------------
volumes:
  mysql-data:

# ----------------------------------------
# Networks: コンテナ間通信
# 同じnetworkに属するコンテナ同士は
# サービス名でアクセスできます (例: http://php)
# ----------------------------------------
networks:
  blog-network:
    driver: bridge
