upstream nextjs {
    server next:3000;
}

server {
    listen 80;
    server_name localhost;

    # アップロードファイルの最大サイズ (デフォルト1MB → 10MBに変更)
    client_max_body_size 10m;

    # ========================================
    # Laravelの静的ファイル (アップロード画像)
    # /storage/* → public/storage から直接配信
    # ========================================
    location /storage {
        root /var/www/backend/public;
        try_files $uri =404;
    }

    # ========================================
    # Laravel API へのルーティング
    # /api/* へのリクエストをPHP-FPMに転送します
    # ========================================
    location /api {
        root /var/www/backend/public;
        try_files $uri $uri/ @api_php;
    }

    # try_filesでファイルが見つからない場合のフォールバック
    # Laravelのindex.phpにすべてのリクエストを渡します
    location @api_php {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        # LaravelのエントリーポイントであるSCRIPT_FILENAMEを固定で指定
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        # 元のリクエストURIをそのままLaravelに渡す (/api/posts など)
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # ========================================
    # Next.js フロントエンドへのルーティング
    # ========================================
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
