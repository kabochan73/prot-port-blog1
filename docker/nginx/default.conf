# ========================================
# Nginx リバースプロキシ設定
# ========================================

# Next.js (フロントエンド) へのアップストリーム設定
# "next" はdocker-composeのサービス名で自動的に名前解決されます
upstream nextjs {
    server next:3000;
}

server {
    listen 80;
    server_name localhost;

    # ========================================
    # Laravel API へのルーティング
    # /api/* へのリクエストをPHP-FPMに転送します
    # ========================================
    location /api {
        root /var/www/backend/public;

        # URLを書き換えてLaravelのindex.phpに通す
        # Laravelはすべてのリクエストをindex.phpで受け取り
        # ルーティングを処理します
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            # PHP-FPMへのリクエスト転送設定
            fastcgi_pass php:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # ========================================
    # Next.js フロントエンドへのルーティング
    # /api 以外のすべてのリクエストをNext.jsへ転送
    # ========================================
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;

        # WebSocket対応 (Next.jsのHot Module Replacementで使用)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 元のホスト情報をNext.jsに伝える
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
